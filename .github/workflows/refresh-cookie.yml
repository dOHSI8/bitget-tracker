name: Refresh Bitget cookie

# Silently renews the Bitget session cookie and pushes it to the tracker.
# Runs on a schedule; if the silent refresh fails (session truly expired),
# the job fails and GitHub emails you to run a full `npm run login` by hand.

on:
  schedule:
    # Every 3 hours. Bitget's anti-fraud can revoke the session well before its
    # nominal expiry, so renew often to catch and extend it while still alive.
    # Cron times are UTC and may drift a few minutes.
    - cron: '0 */3 * * *'
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

concurrency:
  group: refresh-cookie
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA pinned to v4.2.2 — prevents silent tag-moves.
      # Verify at: https://github.com/actions/checkout/releases/tag/v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@v4.3.0
        with:
          node-version: 20

      - name: Install headless deps
        working-directory: headless
        # npm ci installs exact versions from package-lock.json — no floating
        # semver resolution, so a compromised patch release can't sneak in.
        run: npm ci --ignore-scripts --no-audit --no-fund
        
      - name: Install Chrome for Puppeteer
        working-directory: headless
        run: npx puppeteer browsers install chrome
        
      - name: Refresh and push cookie
        working-directory: headless
        env:
          TRACKER_URL: ${{ secrets.TRACKER_URL }}
          COOKIE_SYNC_TOKEN: ${{ secrets.COOKIE_SYNC_TOKEN }}
        run: node refresh-and-push.js
