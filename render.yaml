services:
  - type: web
    name: bitget-tracker
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: "10000"
      - key: TRADERS
        # Set your real traders here OR override in the Render dashboard env vars.
        # Format: Name:portfolioId[:futures], comma-separated.
        value: "TraderName:YOUR_PORTFOLIO_ID"
      - key: POLL_INTERVAL_SEC
        value: "30"
